name: 水位水泵控制

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 升级 pip 并安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 显示已安装包（便于调试）
        run: pip list

      - name: PyInstaller 打包（严格模式）
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          Write-Host "开始打包..."
          python -m PyInstaller --log-level=INFO --clean --noconfirm `
            --windowed --onedir `
            --name "水位水泵控制" `
            --collect-all easyocr `
            --collect-all torch `
            --collect-all torchvision `
            --collect-all opencv-python `
            --collect-all pillow `
            --collect-all pynput `
            --collect-all pygame `
            --collect-all pyautogui `
            --hidden-import=cv2 `
            --hidden-import=PIL `
            --hidden-import=pygame `
            --hidden-import=pyautogui `
            --hidden-import=win10toast `
            --hidden-import=pynput.keyboard._win32 `
            --hidden-import=pynput.mouse._win32 `
            main.py
          Write-Host "打包命令执行完毕"

          # 检查关键输出目录
          if (Test-Path "dist/水位水泵控制/水位水泵控制.exe") {
            Write-Host "✅ 打包成功，EXE 已生成"
          } else {
            Write-Error "❌ 打包失败：未找到 dist/水位水泵控制/水位水泵控制.exe"
            exit 1
          }

      - name: 压缩打包文件夹
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          Compress-Archive -Path "dist/水位水泵控制/*" -DestinationPath "水位水泵控制.zip"
          if (Test-Path "水位水泵控制.zip") {
            Write-Host "压缩完成：水位水泵控制.zip"
          } else {
            Write-Error "压缩失败"
            exit 1
          }

      - name: 上传制品
        uses: actions/upload-artifact@v4
        with:
          name: 水位水泵控制-Windows
          path: 水位水泵控制.zip
