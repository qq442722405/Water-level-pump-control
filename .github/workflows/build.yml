name: 水位水泵控制

on:
  workflow_dispatch:          # 仅手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 升级 pip
        run: python -m pip install --upgrade pip

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 缓存 EasyOCR 模型
        id: cache-models
        uses: actions/cache@v3
        with:
          path: models
          key: easyocr-models-${{ hashFiles('requirements.txt') }}

      - name: 下载 EasyOCR 模型（若缓存未命中）
        if: steps.cache-models.outputs.cache-hit != 'true'
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python -c "import easyocr; reader = easyocr.Reader(['en'], model_storage_directory='models', download_enabled=True)"

      - name: PyInstaller 打包（onedir 模式，更稳定）
        shell: powershell
        run: |
          python -m PyInstaller --clean --noconfirm `
            --windowed --onedir `
            --name "水位水泵控制" `
            --icon=1.ico `
            --collect-all easyocr `
            --collect-all torch `
            --collect-all torchvision `
            --hidden-import=cv2 `
            --hidden-import=PIL `
            --hidden-import=pygame `
            --hidden-import=pyautogui `
            --hidden-import=win10toast `
            --hidden-import=pynput.keyboard._win32 `
            --hidden-import=pynput.mouse._win32 `
            --add-data "models;models" `
            main.py
          # 若没有 1.ico，删除 --icon=1.ico 即可，不会报错

      - name: 将打包文件夹压缩为 ZIP
        shell: powershell
        run: |
          Compress-Archive -Path "dist/水位水泵控制/*" -DestinationPath "水位水泵控制_${{ github.run_number }}.zip"

      - name: 上传压缩包
        uses: actions/upload-artifact@v4
        with:
          name: 水位水泵控制-Windows
          path: 水位水泵控制_${{ github.run_number }}.zip
