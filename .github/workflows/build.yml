name: 水位水泵控制

on:
  workflow_dispatch:          # 仅手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 升级 pip
        run: python -m pip install --upgrade pip

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: PyInstaller 打包（onedir 模式，最稳定）
        shell: powershell
        run: |
          python -m PyInstaller --clean --noconfirm `
            --windowed --onedir `
            --name "水位水泵控制" `
            --collect-all easyocr `
            --collect-all torch `
            --collect-all torchvision `
            --hidden-import=cv2 `
            --hidden-import=PIL `
            --hidden-import=pygame `
            --hidden-import=pyautogui `
            --hidden-import=win10toast `
            --hidden-import=pynput.keyboard._win32 `
            --hidden-import=pynput.mouse._win32 `
            main.py
          # 无 --icon 行，也不打包 models，确保不会因文件缺失而失败

      - name: 压缩打包文件夹
        shell: powershell
        run: |
          Compress-Archive -Path "dist/水位水泵控制/*" -DestinationPath "水位水泵控制.zip"

      - name: 上传制品
        uses: actions/upload-artifact@v4
        with:
          name: 水位水泵控制-Windows
          path: 水位水泵控制.zip
