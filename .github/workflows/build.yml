name: 水位水泵控制

on:
  workflow_dispatch:   # 仅手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖（含 PyInstaller）
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 缓存 EasyOCR 模型
        id: cache-models
        uses: actions/cache@v3
        with:
          path: models
          key: easyocr-models-${{ hashFiles('requirements.txt') }}

      - name: 下载 EasyOCR 模型（若缓存未命中）
        if: steps.cache-models.outputs.cache-hit != 'true'
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python -c "import easyocr; reader = easyocr.Reader(['en'], model_storage_directory='models', download_enabled=True)"

      - name: 使用 PyInstaller 打包
        shell: powershell
        run: |
          python -m PyInstaller --onefile --windowed `
            --add-data "alarm.wav;." `
            --add-data "config.json;." `
            --add-data "models;models/" `
            --hidden-import=pynput.keyboard._win32 `
            --hidden-import=pynput.mouse._win32 `
            --name "水位水泵控制" `
            main.py

      - name: 上传成品 EXE
        uses: actions/upload-artifact@v4
        with:
          name: 水位水泵控制-Windows
          path: dist/水位水泵控制.exe
