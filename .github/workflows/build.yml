name: 水位水泵控制

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip and install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: List installed packages (debug)
        run: pip list

      - name: Build with PyInstaller (onedir, strict mode)
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          Write-Host "Starting PyInstaller build..."
          python -m PyInstaller --log-level=INFO --clean --noconfirm `
            --windowed --onedir `
            --name "水位水泵控制" `
            --collect-all easyocr `
            --collect-all torch `
            --collect-all torchvision `
            --collect-all opencv-python `
            --collect-all pillow `
            --collect-all pynput `
            --collect-all pygame `
            --collect-all pyautogui `
            --hidden-import=cv2 `
            --hidden-import=PIL `
            --hidden-import=pygame `
            --hidden-import=pyautogui `
            --hidden-import=win10toast `
            --hidden-import=pynput.keyboard._win32 `
            --hidden-import=pynput.mouse._win32 `
            main.py
          Write-Host "PyInstaller command completed"

          # Check if output exe exists
          if (Test-Path "dist/水位水泵控制/水位水泵控制.exe") {
            Write-Host "BUILD SUCCESS: EXE found"
          } else {
            Write-Error "BUILD FAILED: EXE not found"
            exit 1
          }

      - name: Compress output folder
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          Compress-Archive -Path "dist/水位水泵控制/*" -DestinationPath "水位水泵控制.zip"
          if (Test-Path "水位水泵控制.zip") {
            Write-Host "Compression OK: 水位水泵控制.zip"
          } else {
            Write-Error "Compression failed"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 水位水泵控制-Windows
          path: 水位水泵控制.zip
