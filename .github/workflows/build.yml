name: 水位水泵控制

on:
  workflow_dispatch:   # 仅手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 创建缺失文件（若不存在）
        shell: powershell
        run: |
          # 如果 alarm.wav 不存在，生成 1 秒静音文件（避免打包报错）
          if (-not (Test-Path alarm.wav)) {
            python -c "import wave, struct; w=wave.open('alarm.wav','w'); w.setnchannels(1); w.setsampwidth(2); w.setframerate(44100); w.writeframes(struct.pack('h',0)*44100); w.close()"
          }
          # 如果 config.json 不存在，写入默认配置
          if (-not (Test-Path config.json)) {
            @"
{
    "water_high":120,
    "water_low":90,
    "freq_high":50,
    "freq_low":35,
    "alarm_count":5,
    "ocr_interval":500,
    "click_delay":300,
    "point1":[1250,560],
    "point2":[1320,560],
    "water_rect":[100,100,120,35],
    "freq_rect":[350,100,120,35],
    "easyocr_model":"models"
}
"@ | Out-File -Encoding utf8 config.json
          }

      - name: 缓存 EasyOCR 模型
        id: cache-models
        uses: actions/cache@v3
        with:
          path: models
          key: easyocr-models-${{ hashFiles('requirements.txt') }}

      - name: 下载 EasyOCR 模型（若缓存未命中）
        if: steps.cache-models.outputs.cache-hit != 'true'
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python -c "import easyocr; reader = easyocr.Reader(['en'], model_storage_directory='models', download_enabled=True)"

      - name: 使用 PyInstaller 打包
        shell: powershell
        run: |
          python -m PyInstaller --onefile --windowed `
            --add-data "alarm.wav;." `
            --add-data "config.json;." `
            --add-data "models;models/" `
            --hidden-import=pynput.keyboard._win32 `
            --hidden-import=pynput.mouse._win32 `
            --name "水位水泵控制" `
            main.py

      - name: 上传成品 EXE
        uses: actions/upload-artifact@v4
        with:
          name: 水位水泵控制-Windows
          path: dist/水位水泵控制.exe
