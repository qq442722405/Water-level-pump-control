name: Build Windows EXE

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # 支持在 GitHub 页面点击按钮手动触发打包

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: 优先安装 PyTorch CPU 版本 (极大优化打包速度与体积)
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

    - name: 安装项目依赖清单
      run: |
        pip install -r requirements.txt

    - name: 执行 PyInstaller 打包 (应用 1.ico 图标)
      run: |
        pyinstaller --noconsole --onefile --icon=1.ico --add-data "1.ico;." --name="水位水泵控制系统" main.py

    - name: 上传打包产物 (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: WaterPumpControl-Windows
        path: dist/水位水泵控制系统.exe
